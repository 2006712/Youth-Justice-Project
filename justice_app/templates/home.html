<!DOCTYPE html>
<html>
<head>
    <title>Youth List</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f7f9fc;
            color: #2c3e50;
        }

        h1 {
            color: #1f4e79;
            margin-bottom: 25px;
        }

        .youth-card {
            background: white;
            border: 1px solid #dcdfe6;
            border-radius: 10px;
            padding: 15px 20px;
            margin-bottom: 15px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
            max-width: 600px;
        }

        .name {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        a {
            color: #0b5394;
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <h1>Youth List</h1>

    {% for youth in youths %}
        <div class="youth-card">
            <div class="name">{{ youth.name }}</div>
            <div>Age: {{ youth.age }}</div>
            <br>
            <a href="/recommend/{{ youth.id }}/">View Recommendations</a>
        </div>
    {% endfor %}

</body>
</html>
